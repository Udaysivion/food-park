<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Park – Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --bg3: #1a1a25;
      --border: rgba(212,160,23,0.15);
      --border-hover: rgba(212,160,23,0.4);
      --gold: #D4A017;
      --gold2: #f0bb3a;
      --red: #8B1A1A;
      --red2: #b52020;
      --text: #f0ece4;
      --text-muted: #9a9585;
      --success: #22c55e;
      --danger: #ef4444;
      --sidebar-w: 260px;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ── */
    .app { display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); min-height: 100vh; background: var(--bg2);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; z-index: 100;
      transition: transform .3s ease;
    }
    .sidebar-logo {
      padding: 24px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .sidebar-logo .logo-icon {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg,#D4A017,#8B1A1A);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .sidebar-logo h1 { font-family:'Playfair Display',serif; font-size:16px; line-height:1.2; }
    .sidebar-logo span { font-size:11px; color:var(--text-muted); font-weight:400; }
    .sidebar-section { padding:16px 12px 8px; font-size:10px; font-weight:600;
      text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); }
    .sidebar-btn { display:flex; align-items:center; gap:10px; width:100%;
      padding:10px 12px; border-radius:10px; border:none; background:transparent;
      color:var(--text); font-size:13px; cursor:pointer; text-align:left;
      transition:all .2s; margin:2px 0; }
    .sidebar-btn:hover { background:rgba(212,160,23,0.1); color:var(--gold); }
    .sidebar-btn.active { background:linear-gradient(135deg,rgba(212,160,23,0.2),rgba(139,26,26,0.2));
      color:var(--gold); border:1px solid var(--border); }
    .sidebar-btn .icon { width:18px; text-align:center; font-size:15px; }
    .cat-count { margin-left:auto; background:var(--bg3); color:var(--text-muted);
      font-size:10px; padding:2px 7px; border-radius:20px; }
    .sidebar-footer { margin-top:auto; padding:16px 12px; border-top:1px solid var(--border); }
    .add-cat-btn { display:flex; align-items:center; gap:8px; width:100%;
      padding:10px 14px; background:linear-gradient(135deg,var(--gold),#c49010);
      color:#1a0f00; font-weight:600; font-size:13px; border:none; border-radius:10px;
      cursor:pointer; transition:all .2s; }
    .add-cat-btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(212,160,23,0.3); }

    /* ── Main ── */
    .main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }

    /* ── Topbar ── */
    .topbar {
      padding:20px 32px; border-bottom:1px solid var(--border);
      background:var(--bg2); display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:50;
    }
    .topbar-left h2 { font-family:'Playfair Display',serif; font-size:24px; }
    .topbar-left p { color:var(--text-muted); font-size:13px; margin-top:2px; }
    .topbar-actions { display:flex; gap:10px; }
    .btn { padding:9px 18px; border-radius:10px; border:none; cursor:pointer;
      font-size:13px; font-weight:600; transition:all .2s; display:flex; align-items:center; gap:7px; }
    .btn-primary { background:linear-gradient(135deg,var(--gold),#c49010); color:#1a0f00; }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(212,160,23,0.3); }
    .btn-danger { background:rgba(239,68,68,0.15); color:var(--danger); border:1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background:rgba(239,68,68,0.25); }
    .btn-ghost { background:transparent; color:var(--text-muted); border:1px solid var(--border); }
    .btn-ghost:hover { color:var(--text); border-color:var(--border-hover); }

    /* ── Content ── */
    .content { padding:32px; flex:1; }
    .empty-state { text-align:center; padding:80px 20px; }
    .empty-state .emoji { font-size:64px; }
    .empty-state h3 { font-size:22px; margin:16px 0 8px; }
    .empty-state p { color:var(--text-muted); font-size:14px; }

    /* ── Stats row ── */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:28px; }
    .stat-card {
      background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:18px;
      display:flex; flex-direction:column; gap:6px;
    }
    .stat-card .label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
    .stat-card .value { font-size:28px; font-weight:700; color:var(--gold); }
    .stat-card .sub { font-size:12px; color:var(--text-muted); }

    /* ── Grid ── */
    .items-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }

    /* ── Menu Card ── */
    .menu-card {
      background:var(--bg3); border:1px solid var(--border); border-radius:16px;
      overflow:hidden; transition:all .25s; position:relative;
    }
    .menu-card:hover { border-color:var(--border-hover); transform:translateY(-2px);
      box-shadow:0 8px 32px rgba(212,160,23,0.1); }
    .menu-card .card-img { width:100%; height:180px; object-fit:cover; display:block;
      background:var(--bg2); }
    .menu-card .card-img-placeholder { width:100%; height:180px; background:linear-gradient(135deg,#1a1a25,#12121a);
      display:flex; align-items:center; justify-content:center; font-size:48px; }
    .menu-card .card-body { padding:16px; }
    .menu-card .card-name { font-weight:600; font-size:15px; margin-bottom:6px; line-height:1.3; }
    .menu-card .card-desc { font-size:12px; color:var(--text-muted); line-height:1.6; margin-bottom:12px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .menu-card .card-prices { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .price-badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; }
    .price-full { background:rgba(212,160,23,0.15); color:var(--gold); border:1px solid rgba(212,160,23,0.3); }
    .price-half { background:rgba(139,26,26,0.15); color:#e57373; border:1px solid rgba(139,26,26,0.3); }
    .menu-card .card-actions { display:flex; gap:8px; }
    .card-btn { flex:1; padding:7px; border-radius:8px; border:none; cursor:pointer;
      font-size:12px; font-weight:600; transition:all .2s; }
    .card-btn-edit { background:rgba(212,160,23,0.1); color:var(--gold); border:1px solid rgba(212,160,23,0.2); }
    .card-btn-edit:hover { background:rgba(212,160,23,0.25); }
    .card-btn-delete { background:rgba(239,68,68,0.1); color:var(--danger); border:1px solid rgba(239,68,68,0.2); }
    .card-btn-delete:hover { background:rgba(239,68,68,0.25); }

    /* ── Modal ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7);
      backdrop-filter:blur(6px); z-index:999; display:none; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal {
      background:var(--bg2); border:1px solid var(--border-hover); border-radius:20px;
      padding:32px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto;
      animation:slideIn .3s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(20px) scale(0.97); } to { opacity:1; transform:none; } }
    .modal h3 { font-family:'Playfair Display',serif; font-size:22px; margin-bottom:24px; }
    .form-group { margin-bottom:18px; }
    .form-label { display:block; font-size:12px; font-weight:600; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    .form-input, .form-textarea {
      width:100%; background:var(--bg3); border:1px solid var(--border);
      color:var(--text); border-radius:10px; padding:10px 14px; font-size:14px;
      font-family:'Inter',sans-serif; transition:border-color .2s; outline:none;
    }
    .form-input:focus, .form-textarea:focus { border-color:var(--gold); }
    .form-textarea { resize:vertical; min-height:80px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .modal-actions { display:flex; gap:10px; margin-top:24px; }
    .modal-actions .btn { flex:1; justify-content:center; }

    /* ── Confirm modal ── */
    .confirm-modal .confirm-icon { font-size:48px; text-align:center; margin-bottom:12px; }
    .confirm-modal h3 { text-align:center; }
    .confirm-modal p { text-align:center; color:var(--text-muted); font-size:14px; margin:8px 0 0; }

    /* ── Toast ── */
    .toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:10px; }
    .toast {
      padding:12px 18px; border-radius:12px; font-size:13px; font-weight:500;
      backdrop-filter:blur(12px); border:1px solid; display:flex; align-items:center; gap:10px;
      animation:toastIn .3s ease; min-width:240px;
    }
    @keyframes toastIn { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:none; } }
    .toast.success { background:rgba(34,197,94,0.15); border-color:rgba(34,197,94,0.3); color:var(--success); }
    .toast.error { background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.3); color:var(--danger); }

    /* ── Search ── */
    .search-bar { position:relative; margin-bottom:24px; }
    .search-bar input { width:100%; background:var(--bg3); border:1px solid var(--border);
      color:var(--text); border-radius:12px; padding:11px 16px 11px 42px;
      font-size:14px; font-family:'Inter',sans-serif; outline:none; transition:border-color .2s; }
    .search-bar input:focus { border-color:var(--gold); }
    .search-bar .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%);
      color:var(--text-muted); font-size:15px; pointer-events:none; }

    /* ── Responsive ── */
    @media(max-width:768px) {
      .sidebar { transform:translateX(-100%); }
      .sidebar.open { transform:none; }
      .main { margin-left:0; }
      .content { padding:20px; }
      .topbar { padding:16px 20px; }
    }

    .hamburger { display:none; background:transparent; border:none; color:var(--text);
      font-size:22px; cursor:pointer; margin-right:12px; }
    @media(max-width:768px) { .hamburger { display:block; } }
    .overlay-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; }
    .overlay-backdrop.open { display:block; }

    .img-preview { width:100%; height:160px; object-fit:cover; border-radius:10px;
      margin-top:8px; border:1px solid var(--border); display:none; }
    .img-preview.show { display:block; }

    .no-items { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .no-items .icon { font-size:48px; display:block; margin-bottom:12px; }
    .no-items p { font-size:14px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar backdrop (mobile) -->
  <div class="overlay-backdrop" id="backdrop" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🍛</div>
      <div>
        <h1>Food Park</h1>
        <span>Admin Panel</span>
      </div>
    </div>

    <div class="sidebar-section">Categories</div>
    <div id="sidebar-cats" style="padding:0 12px; overflow-y:auto; flex:1;"></div>

    <div class="sidebar-footer">
      <button class="add-cat-btn" onclick="openAddCategory()">
        ＋ Add New Category
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <header class="topbar">
      <div style="display:flex;align-items:center;">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <div class="topbar-left">
          <h2 id="topbar-title">Dashboard</h2>
          <p id="topbar-sub">Manage your menu items</p>
        </div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>

    <!-- Content -->
    <div class="content" id="content">
      <!-- Stats -->
      <div class="stats-row" id="stats-row"></div>
      <!-- Search -->
      <div class="search-bar" id="search-wrap" style="display:none;">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search menu items…" oninput="filterItems()" />
      </div>
      <!-- Grid -->
      <div class="items-grid" id="items-grid"></div>
    </div>
  </div>
</div>

<!-- Add/Edit Item Modal -->
<div class="modal-overlay" id="item-modal">
  <div class="modal">
    <h3 id="item-modal-title">Add Menu Item</h3>
    <div class="form-group">
      <label class="form-label">Item Name *</label>
      <input type="text" class="form-input" id="fi-name" placeholder="e.g. Hyderabadi Biryani" />
    </div>
    <div class="form-group">
      <label class="form-label">Description *</label>
      <textarea class="form-textarea" id="fi-desc" placeholder="Describe the dish…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Full Price (₹) *</label>
        <input type="number" class="form-input" id="fi-full" placeholder="170" />
      </div>
      <div class="form-group">
        <label class="form-label">Half Price (₹)</label>
        <input type="number" class="form-input" id="fi-half" placeholder="Leave blank if no half" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Image URL</label>
      <input type="url" class="form-input" id="fi-image" placeholder="https://…" oninput="previewImg()" />
      <img class="img-preview" id="fi-img-preview" alt="preview" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('item-modal')">Cancel</button>
      <button class="btn btn-primary" id="item-save-btn" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<!-- Add Category Modal -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal" style="max-width:380px;">
    <h3>Add New Category</h3>
    <div class="form-group">
      <label class="form-label">Category Name *</label>
      <input type="text" class="form-input" id="fc-name" placeholder="e.g. Tandoori" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('cat-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCategory()">Create Category</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal confirm-modal" style="max-width:380px;">
    <div class="confirm-icon">⚠️</div>
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-msg">This action cannot be undone.</p>
    <div class="modal-actions" style="margin-top:24px;">
      <button class="btn btn-ghost" onclick="closeModal('confirm-modal')">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Delete</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script>
const API = 'http://localhost:4000/api/menu';
let menu = {};
let activeCategory = null;
let editingItemId = null;
let allItems = [];

// ── Init ──
async function init() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error('API error');
    menu = await res.json();
    renderSidebar();
    renderDashboard();
  } catch (e) {
    showContent(`
      <div class="empty-state">
        <div class="emoji">🔌</div>
        <h3>Backend not connected</h3>
        <p>Make sure the backend server is running at <strong>http://localhost:4000</strong></p>
        <p style="margin-top:8px;color:#ef4444;">Error: ${e.message}</p>
      </div>
    `);
  }
}

// ── Sidebar ──
function renderSidebar() {
  const container = document.getElementById('sidebar-cats');
  container.innerHTML = '';
  Object.keys(menu).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-btn' + (cat === activeCategory ? ' active' : '');
    btn.innerHTML = `<span class="icon">🍽️</span>${cat}<span class="cat-count">${menu[cat].length}</span>`;
    btn.onclick = () => selectCategory(cat);
    container.appendChild(btn);
  });
}

// ── Dashboard ──
function renderDashboard() {
  activeCategory = null;
  document.getElementById('topbar-title').textContent = 'Dashboard';
  document.getElementById('topbar-sub').textContent = 'Overview of your entire menu';
  document.getElementById('topbar-actions').innerHTML = '';
  document.getElementById('search-wrap').style.display = 'none';
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));

  const totalItems = Object.values(menu).reduce((a, c) => a + c.length, 0);
  const totalCats = Object.keys(menu).length;

  const statsRow = document.getElementById('stats-row');
  statsRow.innerHTML = `
    <div class="stat-card">
      <div class="label">Total Categories</div>
      <div class="value">${totalCats}</div>
      <div class="sub">menu sections</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Items</div>
      <div class="value">${totalItems}</div>
      <div class="sub">across all categories</div>
    </div>
    <div class="stat-card">
      <div class="label">Avg Items/Category</div>
      <div class="value">${totalCats ? (totalItems/totalCats).toFixed(1) : 0}</div>
      <div class="sub">per section</div>
    </div>
  `;

  const grid = document.getElementById('items-grid');
  grid.innerHTML = Object.entries(menu).map(([cat, items]) => `
    <div class="menu-card" style="cursor:pointer;" onclick="selectCategory('${cat.replace(/'/g,"\\'")}')">
      <div class="card-img-placeholder">${getCatEmoji(cat)}</div>
      <div class="card-body">
        <div class="card-name">${cat}</div>
        <div class="card-desc">${items.length} item${items.length !== 1 ? 's' : ''} available</div>
        <div class="card-actions">
          <button class="card-btn card-btn-edit" onclick="event.stopPropagation();selectCategory('${cat.replace(/'/g,"\\'")}')">View Items</button>
        </div>
      </div>
    </div>
  `).join('');
}

function getCatEmoji(cat) {
  const map = { biryani:'🍛', chicken:'🍗', mutton:'🥩', prawn:'🦐', fish:'🐟', egg:'🥚',
    noodle:'🍜', fried:'🍚', veg:'🥦', meal:'🍽️', rice:'🍚' };
  const lc = cat.toLowerCase();
  for (const [k,v] of Object.entries(map)) { if (lc.includes(k)) return v; }
  return '🍴';
}

// ── Category view ──
function selectCategory(cat) {
  activeCategory = cat;
  allItems = menu[cat] || [];
  document.getElementById('topbar-title').textContent = cat;
  document.getElementById('topbar-sub').textContent = `${allItems.length} items in this category`;
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-danger" onclick="confirmDeleteCategory('${cat.replace(/'/g,"\\'")}')">🗑 Delete Category</button>
    <button class="btn btn-primary" onclick="openAddItem()">＋ Add Item</button>
  `;
  document.getElementById('search-wrap').style.display = 'block';
  document.getElementById('search-input').value = '';
  document.getElementById('stats-row').innerHTML = '';
  renderSidebar();
  renderItems(allItems);
}

function filterItems() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = allItems.filter(i => i.name.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q));
  renderItems(filtered);
}

function renderItems(items) {
  const grid = document.getElementById('items-grid');
  if (!items.length) {
    grid.innerHTML = `<div class="no-items" style="grid-column:1/-1;">
      <span class="icon">🍽️</span>
      <p>No items found. Add your first item!</p>
    </div>`;
    return;
  }
  grid.innerHTML = items.map(item => `
    <div class="menu-card">
      ${item.image
        ? `<img class="card-img" src="${item.image}" alt="${item.name}" onerror="this.style.display='none'" loading="lazy" />`
        : `<div class="card-img-placeholder">🍽️</div>`
      }
      <div class="card-body">
        <div class="card-name">${item.name}</div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-prices">
          <span class="price-badge price-full">Full ₹${item.full}</span>
          ${item.half ? `<span class="price-badge price-half">Half ₹${item.half}</span>` : ''}
        </div>
        <div class="card-actions">
          <button class="card-btn card-btn-edit" onclick="openEditItem('${item.id}')">✏ Edit</button>
          <button class="card-btn card-btn-delete" onclick="confirmDeleteItem('${item.id}', '${item.name.replace(/'/g,"\\'")}')">🗑 Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ── Add/Edit Item Modal ──
function openAddItem() {
  editingItemId = null;
  document.getElementById('item-modal-title').textContent = 'Add Menu Item';
  document.getElementById('item-save-btn').textContent = 'Add Item';
  ['fi-name','fi-desc','fi-full','fi-half','fi-image'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fi-img-preview').className = 'img-preview';
  openModal('item-modal');
}

function openEditItem(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  editingItemId = id;
  document.getElementById('item-modal-title').textContent = 'Edit Menu Item';
  document.getElementById('item-save-btn').textContent = 'Save Changes';
  document.getElementById('fi-name').value = item.name;
  document.getElementById('fi-desc').value = item.desc;
  document.getElementById('fi-full').value = item.full;
  document.getElementById('fi-half').value = item.half || '';
  document.getElementById('fi-image').value = item.image || '';
  previewImg();
  openModal('item-modal');
}

async function saveItem() {
  const name = document.getElementById('fi-name').value.trim();
  const desc = document.getElementById('fi-desc').value.trim();
  const full = document.getElementById('fi-full').value;
  const half = document.getElementById('fi-half').value;
  const image = document.getElementById('fi-image').value.trim();

  if (!name || !desc || !full) { toast('Please fill in Name, Description and Full Price', 'error'); return; }

  const body = { name, desc, full, half: half || null, image };

  try {
    let res;
    if (editingItemId) {
      res = await fetch(`${API}/category/${encodeURIComponent(activeCategory)}/item/${editingItemId}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
    } else {
      res = await fetch(`${API}/category/${encodeURIComponent(activeCategory)}/item`, {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    closeModal('item-modal');
    toast(editingItemId ? 'Item updated!' : 'Item added!', 'success');
    await refreshMenu();
    selectCategory(activeCategory);
  } catch(e) { toast(e.message, 'error'); }
}

// ── Add Category ──
function openAddCategory() { document.getElementById('fc-name').value = ''; openModal('cat-modal'); }

async function saveCategory() {
  const name = document.getElementById('fc-name').value.trim();
  if (!name) { toast('Category name is required', 'error'); return; }
  try {
    const res = await fetch(`${API}/category`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    closeModal('cat-modal');
    toast(`Category "${name}" created!`, 'success');
    await refreshMenu();
    selectCategory(name);
  } catch(e) { toast(e.message, 'error'); }
}

// ── Delete Category ──
function confirmDeleteCategory(cat) {
  document.getElementById('confirm-title').textContent = `Delete "${cat}"?`;
  document.getElementById('confirm-msg').textContent = `This will permanently delete the category and all ${(menu[cat]||[]).length} items inside it.`;
  document.getElementById('confirm-ok-btn').onclick = () => deleteCategory(cat);
  openModal('confirm-modal');
}

async function deleteCategory(cat) {
  try {
    const res = await fetch(`${API}/category/${encodeURIComponent(cat)}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    closeModal('confirm-modal');
    toast(`Category "${cat}" deleted`, 'success');
    await refreshMenu();
    renderDashboard();
  } catch(e) { toast(e.message, 'error'); }
}

// ── Delete Item ──
function confirmDeleteItem(id, name) {
  document.getElementById('confirm-title').textContent = `Delete "${name}"?`;
  document.getElementById('confirm-msg').textContent = 'This menu item will be permanently removed.';
  document.getElementById('confirm-ok-btn').onclick = () => deleteItem(id);
  openModal('confirm-modal');
}

async function deleteItem(id) {
  try {
    const res = await fetch(`${API}/category/${encodeURIComponent(activeCategory)}/item/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    closeModal('confirm-modal');
    toast('Item deleted', 'success');
    await refreshMenu();
    selectCategory(activeCategory);
  } catch(e) { toast(e.message, 'error'); }
}

// ── Helpers ──
async function refreshMenu() {
  const res = await fetch(API);
  menu = await res.json();
  renderSidebar();
}

function previewImg() {
  const url = document.getElementById('fi-image').value.trim();
  const prev = document.getElementById('fi-img-preview');
  if (url) { prev.src = url; prev.className = 'img-preview show'; }
  else { prev.className = 'img-preview'; }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

function showContent(html) { document.getElementById('items-grid').innerHTML = html; }

function toast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `${type==='success'?'✅':'❌'} ${msg}`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
}

init();
</script>
